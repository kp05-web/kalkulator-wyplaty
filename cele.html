<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cele oszczędnościowe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1a1a1a;
  --text-muted: #888;
  --text-hint: #bbb;
  --accent: #2c5fe6;
  --accent-bg: #eef2fd;
  --success: #1a9e6e;
  --success-bg: #e8f7f2;
  --radius: 14px;
  --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141414;
    --surface: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --text-muted: #888;
    --text-hint: #444;
    --accent: #5b84f0;
    --accent-bg: #1a2340;
    --success: #2ec98a;
    --success-bg: #0f2820;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between}
.top-bar h1{font-size:17px;font-weight:500;letter-spacing:-0.02em}
.top-bar .mono{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted)}
.container{max-width:480px;margin:0 auto;padding:20px 16px}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text-muted);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px}
.metric-value{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;letter-spacing:-0.02em}
.metric-value.accent{color:var(--accent)}
.section-label{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
.goals{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 18px 14px;transition:border-color .2s}
.goal-card.is-main{border-color:var(--accent)}
.goal-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.goal-name{font-size:15px;font-weight:500;letter-spacing:-0.02em;flex:1;margin-right:8px}
.badge-main{font-size:10px;padding:3px 8px;border-radius:20px;background:var(--accent-bg);color:var(--accent);font-weight:500;white-space:nowrap;letter-spacing:0.02em}
.goal-numbers{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.goal-saved{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;letter-spacing:-0.04em}
.goal-of{font-size:13px;color:var(--text-muted)}
.goal-target-val{font-family:'DM Mono',monospace;font-size:13px}
.bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px}
.bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.goal-footer{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:12px}
.goal-actions{display:flex;gap:8px}
.btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 0;border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);flex:1;transition:all .15s;-webkit-appearance:none}
.btn:active{transform:scale(0.97)}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent}
.btn.primary:active{opacity:0.85}
.btn.danger{color:#e24b4a;border-color:rgba(226,75,74,0.3)}
.add-btn{width:100%;padding:16px;border:1px dashed var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-muted);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px;transition:all .2s}
.add-btn:active{background:var(--surface)}
.tip{background:var(--accent-bg);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--accent);margin-bottom:24px;line-height:1.5;display:none}
.hist-label{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-left{}
.hist-goal-name{font-size:13px;font-weight:500}
.hist-note{font-size:12px;color:var(--text-muted)}
.hist-right{text-align:right}
.hist-amount{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--success)}
.hist-date{font-size:12px;color:var(--text-muted)}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 20px 40px;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-size:17px;font-weight:500;letter-spacing:-0.02em;margin-bottom:20px}
.drag-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 20px}
.fg{margin-bottom:14px}
.fg label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;letter-spacing:0.02em}
.fg input,.fg select{width:100%;padding:12px 14px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;-webkit-appearance:none;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.sheet-btns{display:flex;gap:10px;margin-top:20px}
.sheet-btn{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border-strong);background:transparent;color:var(--text-muted);transition:all .15s}
.sheet-btn.ok{background:var(--accent);color:#fff;border-color:transparent}
.sheet-btn:active{transform:scale(0.97)}
svg.icon{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
</style>
</head>
<body>
<div class="top-bar">
  <h1>💰 Moje cele</h1>
  <span class="mono" id="last-upd"></span>
</div>
<div class="container">
  <div class="summary" id="summary"></div>
  <div class="section-label">Cele</div>
  <div class="goals" id="goals"></div>
  <button class="add-btn" onclick="openAdd()">
    <svg class="icon"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Dodaj nowy cel
  </button>
  <div class="tip" id="tip"></div>
  <div id="history"></div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="drag-handle"></div>
    <div id="sheet-body"></div>
  </div>
</div>

<script>
const KEY = 'savings_goals_v3';
let S = { goals: [], deposits: [] };

function load() {
  try { const r = localStorage.getItem(KEY); if (r) S = JSON.parse(r); } catch(e) {}
  if (!S.goals) S.goals = [];
  if (!S.deposits) S.deposits = [];
  render();
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {} }

function fmoney(n) { return Math.round(n).toLocaleString('pl-PL'); }
function fdate(iso) { return new Date(iso).toLocaleDateString('pl-PL', { day:'numeric', month:'short', year:'numeric' }); }
function monthsLeft(g) {
  if (!g.monthly || g.monthly <= 0 || !g.target) return null;
  const r = g.target - g.saved; if (r <= 0) return 0;
  return Math.ceil(r / g.monthly);
}

function render() {
  const ts = S.goals.reduce((s,g) => s + (g.saved||0), 0);
  const tt = S.goals.reduce((s,g) => s + (g.target||0), 0);
  const pct = tt > 0 ? Math.round(ts/tt*100) : 0;
  const main = S.goals.find(g => g.isMain) || S.goals[0];
  const ml = main ? monthsLeft(main) : null;

  document.getElementById('last-upd').textContent = S.lastUpdated ? fdate(S.lastUpdated) : '';

  document.getElementById('summary').innerHTML = `
    <div class="metric"><div class="metric-label">Odłożone</div><div class="metric-value accent">${fmoney(ts)} zł</div></div>
    <div class="metric"><div class="metric-label">Postęp</div><div class="metric-value">${pct}%</div></div>
    ${main && main.target > 0 ? `<div class="metric"><div class="metric-label">Brakuje (gł.)</div><div class="metric-value">${fmoney(Math.max(0, main.target - main.saved))} zł</div></div>` : ''}
    ${ml !== null && ml > 0 ? `<div class="metric"><div class="metric-label">Cel za</div><div class="metric-value">${ml} mies.</div></div>` : ''}
  `;

  let html = '';
  const colors = ['#2c5fe6','#1a9e6e','#d85a30','#9b59b6','#e67e22','#e91e63'];
  for (let i = 0; i < S.goals.length; i++) {
    const g = S.goals[i];
    const color = g.color || colors[i % colors.length];
    const p = g.target > 0 ? Math.min(100, Math.round(g.saved / g.target * 100)) : 0;
    const rem = Math.max(0, g.target - g.saved);
    const m = monthsLeft(g);
    let when = '';
    if (m === 0) when = '🎉 Cel osiągnięty!';
    else if (m !== null && g.target > 0) {
      const d = new Date(Date.now() + m * 30 * 24 * 3600 * 1000);
      when = `~${m} mies. · ${d.toLocaleDateString('pl-PL', { month: 'long', year: 'numeric' })}`;
    } else if (!g.target) when = 'Ustaw kwotę celu →';
    else when = 'Ustaw miesięczną wpłatę →';

    html += `<div class="goal-card ${g.isMain ? 'is-main' : ''}">
      <div class="goal-card-top">
        <div class="goal-name">${g.name}</div>
        ${g.isMain ? '<span class="badge-main">GŁÓWNY</span>' : ''}
      </div>
      <div class="goal-numbers">
        <div class="goal-saved">${fmoney(g.saved||0)}</div>
        <div class="goal-of">zł z <span class="goal-target-val">${g.target > 0 ? fmoney(g.target) + ' zł' : '—'}</span></div>
      </div>
      ${g.target > 0 ? `<div class="bar-wrap"><div class="bar-fill" style="width:${p}%;background:${color}"></div></div>` : ''}
      <div class="goal-footer">
        <span>${g.target > 0 ? p + '% · brakuje ' + fmoney(rem) + ' zł' : ''}</span>
        <span>${when}</span>
      </div>
      <div class="goal-actions">
        <button class="btn" onclick="openEdit('${g.id}')">
          <svg class="icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Edytuj
        </button>
        <button class="btn primary" onclick="openDeposit('${g.id}')">
          <svg class="icon"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Wpłać
        </button>
      </div>
    </div>`;
  }
  document.getElementById('goals').innerHTML = html;
  renderTip(main);
  renderHistory();
}

function renderTip(g) {
  const box = document.getElementById('tip');
  if (!g || !g.target) { box.style.display = 'none'; return; }
  const p = g.saved / g.target;
  let t = '';
  if (p < 0.1) t = '💡 Ustaw automatyczny przelew na początku miesiąca — zanim zdążysz wydać.';
  else if (p < 0.5) t = '💡 Zwiększenie miesięcznej wpłaty o 10% skraca czas oszczędzania o kilka miesięcy.';
  else if (p < 0.9) t = '💡 Ponad połowa drogi! Warto już rozejrzeć się po ofertach kredytów hipotecznych.';
  else if (p < 1) t = '💡 Prawie jesteś! Ostatni zryw — premie, dodatkowe zlecenia?';
  else t = '🎉 Cel osiągnięty! Czas działać — sprawdź oferty mieszkań i kredytów.';
  box.style.display = 'block';
  box.textContent = t;
}

function renderHistory() {
  const sec = document.getElementById('history');
  const deps = [...(S.deposits||[])].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 10);
  if (!deps.length) { sec.innerHTML = ''; return; }
  let rows = deps.map(d => {
    const g = S.goals.find(x => x.id === d.goalId);
    return `<div class="hist-item">
      <div class="hist-left"><div class="hist-goal-name">${g ? g.name : '—'}</div>${d.note ? `<div class="hist-note">${d.note}</div>` : ''}</div>
      <div class="hist-right"><div class="hist-amount">+${fmoney(d.amount)} zł</div><div class="hist-date">${fdate(d.date)}</div></div>
    </div>`;
  }).join('');
  sec.innerHTML = `<div class="hist-label" style="margin-top:24px">Ostatnie wpłaty</div>${rows}`;
}

function openDeposit(gid) {
  const g = S.goals.find(x => x.id === gid);
  showSheet(`<h3>Wpłać — ${g.name}</h3>
    <div class="fg"><label>Kwota (zł)</label><input type="number" inputmode="numeric" id="d-a" value="${g.monthly||''}"></div>
    <div class="fg"><label>Data</label><input type="date" id="d-d" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="fg"><label>Notatka (opcjonalnie)</label><input type="text" id="d-n" placeholder="np. pensja za maj"></div>
    <div class="sheet-btns"><button class="sheet-btn" onclick="closeSheet()">Anuluj</button><button class="sheet-btn ok" onclick="doDeposit('${gid}')">Zapisz</button></div>`);
}

function doDeposit(gid) {
  const a = parseFloat(document.getElementById('d-a').value);
  const dt = document.getElementById('d-d').value;
  const note = document.getElementById('d-n').value;
  if (!a || a <= 0) return;
  const g = S.goals.find(x => x.id === gid);
  g.saved = (g.saved||0) + a;
  S.deposits = S.deposits || [];
  S.deposits.push({ goalId: gid, amount: a, date: dt, note });
  S.lastUpdated = dt;
  closeSheet(); save(); render();
}

function openEdit(gid) {
  const g = S.goals.find(x => x.id === gid);
  showSheet(`<h3>Edytuj cel</h3>
    <div class="fg"><label>Nazwa</label><input type="text" id="e-n" value="${g.name}"></div>
    <div class="fg"><label>Kwota docelowa (zł)</label><input type="number" inputmode="numeric" id="e-t" value="${g.target||''}"></div>
    <div class="fg"><label>Miesięczna wpłata (zł)</label><input type="number" inputmode="numeric" id="e-m" value="${g.monthly||''}"></div>
    <div class="fg"><label>Już odłożone (zł)</label><input type="number" inputmode="numeric" id="e-s" value="${g.saved||0}"></div>
    <div class="fg"><label>Typ</label><select id="e-main"><option value="no" ${!g.isMain?'selected':''}>Normalny cel</option><option value="yes" ${g.isMain?'selected':''}>Główny cel</option></select></div>
    <div class="sheet-btns">
      <button class="sheet-btn danger" onclick="doDelete('${gid}')">Usuń</button>
      <button class="sheet-btn" onclick="closeSheet()">Anuluj</button>
      <button class="sheet-btn ok" onclick="doEdit('${gid}')">Zapisz</button>
    </div>`);
}

function doEdit(gid) {
  const g = S.goals.find(x => x.id === gid);
  g.name = document.getElementById('e-n').value.trim() || g.name;
  g.target = parseFloat(document.getElementById('e-t').value) || 0;
  g.monthly = parseFloat(document.getElementById('e-m').value) || 0;
  g.saved = parseFloat(document.getElementById('e-s').value) || 0;
  const isMain = document.getElementById('e-main').value === 'yes';
  if (isMain) S.goals.forEach(x => x.isMain = false);
  g.isMain = isMain;
  closeSheet(); save(); render();
}

function doDelete(gid) {
  if (!confirm('Usunąć ten cel?')) return;
  S.goals = S.goals.filter(g => g.id !== gid);
  S.deposits = (S.deposits||[]).filter(d => d.goalId !== gid);
  closeSheet(); save(); render();
}

function openAdd() {
  const colors = ['#2c5fe6','#1a9e6e','#d85a30','#9b59b6','#e67e22','#e91e63'];
  const col = colors[S.goals.length % colors.length];
  showSheet(`<h3>Nowy cel</h3>
    <div class="fg"><label>Nazwa</label><input type="text" id="n-name" placeholder="np. Wkład na mieszkanie"></div>
    <div class="fg"><label>Kwota docelowa (zł)</label><input type="number" inputmode="numeric" id="n-t" placeholder="np. 90000"></div>
    <div class="fg"><label>Miesięczna wpłata (zł)</label><input type="number" inputmode="numeric" id="n-m" placeholder="np. 2000"></div>
    <div class="fg"><label>Już odłożone (zł)</label><input type="number" inputmode="numeric" id="n-s" value="0"></div>
    <div class="fg"><label>Typ</label><select id="n-main"><option value="no">Normalny cel</option><option value="yes">Główny cel</option></select></div>
    <div class="sheet-btns"><button class="sheet-btn" onclick="closeSheet()">Anuluj</button><button class="sheet-btn ok" onclick="doAdd('${col}')">Dodaj</button></div>`);
}

function doAdd(col) {
  const name = document.getElementById('n-name').value.trim();
  const target = parseFloat(document.getElementById('n-t').value) || 0;
  const monthly = parseFloat(document.getElementById('n-m').value) || 0;
  const saved = parseFloat(document.getElementById('n-s').value) || 0;
  const isMain = document.getElementById('n-main').value === 'yes';
  if (!name) return;
  if (isMain) S.goals.forEach(g => g.isMain = false);
  S.goals.push({ id: 'g' + Date.now(), name, target, saved, monthly, color: col, isMain });
  closeSheet(); save(); render();
}

function showSheet(html) {
  document.getElementById('sheet-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeSheet(); }

load();
</script>
</body>
</html>
